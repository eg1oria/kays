<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI LMS System</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
      }

      header {
        background: #1e3a8a;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .container {
        width: 90%;
        margin: auto;
        margin-top: 30px;
      }

      .card {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
      }

      button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #1d4ed8;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      table th,
      table td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
      }

      .high-risk {
        background: #fecaca;
      }

      .medium-risk {
        background: #fde68a;
      }

      .low-risk {
        background: #bbf7d0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Интеллектуальная LMS система</h1>
      <p>Прогнозирование успеваемости студентов</p>
    </header>

    <div class="container">
      <div class="card">
        <h2>Добавить студента</h2>

        <input type="text" id="name" placeholder="ФИО студента" />

        <input type="number" id="attendance" placeholder="Посещаемость %" />

        <input type="number" id="lab" placeholder="Баллы за лабораторные" />

        <input type="number" id="midterm" placeholder="Баллы за рубежный контроль" />

        <button onclick="addStudent()">Добавить</button>
      </div>

      <div class="card">
        <h2>AI Аналитика</h2>

        <table>
          <thead>
            <tr>
              <th>Студент</th>
              <th>Посещаемость</th>
              <th>Лабы</th>
              <th>Рубежка</th>
              <th>Прогноз</th>
            </tr>
          </thead>

          <tbody id="studentTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      function calculateRisk(attendance, lab, midterm) {
        let risk = 0;

        if (attendance < 60) {
          risk += 40;
        }

        if (lab < 50) {
          risk += 30;
        }

        if (midterm < 50) {
          risk += 30;
        }

        return risk;
      }

      function getPrediction(risk) {
        if (risk >= 70) {
          return 'Высокий риск';
        } else if (risk >= 40) {
          return 'Средний риск';
        } else {
          return 'Низкий риск';
        }
      }

      function getClassName(risk) {
        if (risk >= 70) {
          return 'high-risk';
        } else if (risk >= 40) {
          return 'medium-risk';
        } else {
          return 'low-risk';
        }
      }

      function addStudent() {
        let name = document.getElementById('name').value;
        let attendance = Number(document.getElementById('attendance').value);
        let lab = Number(document.getElementById('lab').value);
        let midterm = Number(document.getElementById('midterm').value);

        let risk = calculateRisk(attendance, lab, midterm);

        let prediction = getPrediction(risk);

        let className = getClassName(risk);

        let table = document.getElementById('studentTable');

        let row = `
            <tr class="${className}">
                <td>${name}</td>
                <td>${attendance}%</td>
                <td>${lab}</td>
                <td>${midterm}</td>
                <td>${prediction}</td>
            </tr>
        `;

        table.innerHTML += row;

        document.getElementById('name').value = '';
        document.getElementById('attendance').value = '';
        document.getElementById('lab').value = '';
        document.getElementById('midterm').value = '';
      }
    </script>
  </body>
</html>
